name: chap10llm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - intel-openmp             # fix KMP_DUPLICATE_LIB_OK Windows
  - streamlit=1.44.1
  - pandas=2.2.3
  - openpyxl=3.1.5
  - pillow>=9.0.0,<12        # streamlit 1.44.1 exige <12
  - numpy>=1.24.0
  - tqdm
  - pip
  - pip:
    # ── LLM / RAG ────────────────────────────────────────────
    - mistralai==1.2.5
    - langchain==0.3.23
    - langchain-core>=0.3.0,<1.0.0       # <1.0.0 obligatoire (langchain 0.3.x)
    - langchain-mistralai>=0.1.0
    - langchain-community>=0.3.0,<1.0.0  # <1.0.0 obligatoire
    - langchain-text-splitters>=0.3.0,<1.0.0
    - faiss-cpu==1.10.0

    # ── Dépendances critiques fixées ─────────────────────────
    - "httpx>=0.27.0,<0.28.0"            # mistralai 1.2.5 exige <0.28
    - "packaging>=20,<25"                # streamlit 1.44.1 exige <25

    # ── Évaluation RAG ───────────────────────────────────────
    - ragas==0.4.3
    - datasets>=2.14.0
    - sentence-transformers>=2.2.0       # embeddings locaux pour AnswerRelevancy

    # ── Validation données ───────────────────────────────────
    - pydantic>=2.0.0
    - pydantic-ai==0.0.14
    - griffe==1.5.6                      # <2.0.0 obligatoire (pydantic-ai)

    # ── Observabilité ────────────────────────────────────────
    - logfire>=0.40.0

    # ── Pipeline PDF / OCR ───────────────────────────────────
    - pymupdf>=1.22.0
    - PyPDF2==3.0.1
    - easyocr
    # torch CUDA : installer via setup_local.ps1 après création de l'env
    # pip install torch==2.7.0+cu128 torchvision --index-url https://download.pytorch.org/whl/cu128

    # ── Base de données ──────────────────────────────────────
    - sqlalchemy>=2.0.0

    # ── Utilitaires ──────────────────────────────────────────
    - python-docx==1.1.2
    - python-dotenv==1.1.0
    - requests==2.32.3
    - streamlit-feedback==0.1.4
